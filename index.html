<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jenkins CI/CD Demo</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .box {
            padding: 30px;
            border: 2px solid #22c55e;
            border-radius: 12px;
            background: #111827;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.4);
        }

        h1 {
            color: #22c55e;
        }

        .tag {
            margin-top: 10px;
            font-size: 14px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>🚀 Jenkins CI/CD Pipeline</h1>
        <p>Deployment Successful👍</p>
        <div class="tag">Built & Deployed using Docker + Jenkins</div>
    </div>

</body>
</html>
